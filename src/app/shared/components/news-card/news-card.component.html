<a
  [routerLink]="navigate"
  class="news-card group cursor-pointer block relative overflow-hidden h-[22rem] 3xl:h-[25.4rem]"
>
  <!-- Wrapper: static background image -->
  <div
    class="news-card__wrapper relative h-full w-full overflow-hidden rounded-md 3xl:rounded-lg"
  >
    <img
      loading="lazy"
      [src]="imageUrl"
      class="news-card__bg-image w-full h-full absolute inset-0 object-cover pointer-events-none"
      [alt]="title"
    />

    <!-- Parent: whole block moves up on hover, read more revealed from bottom -->
    <div class="news-card__parent relative z-[2]">
      <div class="news-card__content-area">
        <div class="news-card__expand-spacer" aria-hidden="true"></div>
        <div class="news-card__white-card">
          <div class="news-card__white-card-inner">
            <div class="flex items-center gap-2 3xl:gap-2 flex-wrap mb-3 3xl:mb-4">
              <div *ngFor="let tag of tags">
                <app-blog-tag
                  text="{{ tag }}"
                  textColor="text-dark-gray2"
                  borderColor="border-dark-gray2"
                  borderRadius="rounded-md 3xl:rounded-lg"
                ></app-blog-tag>
              </div>
            </div>
            <p class="text-dark-gray2 text-xs 3xl:text-sm font-medium 3xl:font-semibold mb-1 3xl:mb-2">
              {{ date }}
            </p>
            <h3 class="text-dark-gray2 text-lg 3xl:text-2xl font-semibold 3xl:font-bold line-clamp">
              {{ title }}
            </h3>
          </div>
        </div>
      </div>

      <!-- <div class="news-card__gap1"></div> -->
      <div class="news-card__gap"></div>

      <div class="news-card__read-more bg-white -m-[1px]">
        <button
          type="button"
          class="text-sm 3xl:text-base flex items-center justify-between font-medium 3xl:font-bold bg-[#003735] w-full h-full px-5 3xl:px-6 text-white rounded-md 3xl:rounded-lg"
        >
          Read more
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="26"
            height="26"
            fill="currentColor"
            class="bi bi-arrow-right-short"
            viewBox="0 0 16 16"
          >
            <path
              fill-rule="evenodd"
              d="M4 8a.5.5 0 0 1 .5-.5h5.793L8.146 5.354a.5.5 0 1 1 .708-.708l3 3a.5.5 0 0 1 0 .708l-3 3a.5.5 0 0 1-.708-.708L10.293 8.5H4.5A.5.5 0 0 1 4 8"
            />
          </svg>
        </button>
      </div>
    </div>
  </div>
</a>
